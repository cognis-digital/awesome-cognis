apiVersion: apps/v1
kind: Deployment
metadata: { name: awesome-cognis, labels: { app: awesome-cognis } }
spec:
  replicas: 1
  selector: { matchLabels: { app: awesome-cognis } }
  template:
    metadata: { labels: { app: awesome-cognis } }
    spec:
      containers:
        - name: awesome-cognis
          image: ghcr.io/cognis-digital/awesome-cognis:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: awesome-cognis }
spec:
  selector: { app: awesome-cognis }
  ports: [{ port: 80, targetPort: 8000 }]
